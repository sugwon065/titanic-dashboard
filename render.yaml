services:
  - type: web
    name: titanic-dashboard-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: titanic-dashboard
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: titanic-dashboard
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: titanic-dashboard-api
          envVarKey: RENDER_EXTERNAL_URL
